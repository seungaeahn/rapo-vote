<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>의사랑기획품질팀 라포 활동 투표</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #000000; --white: #ffffff;
    --grey-muted: rgba(93,93,93,0.64);
    --grey-outline: #c4c4c4; --red: #ff0066;
  }
  body { font-family: 'Pretendard Variable','Pretendard',ui-sans-serif,system-ui,sans-serif; background: var(--white); color: var(--black); min-height: 100vh; padding: 48px 24px 80px; }
  .container { max-width: 560px; margin: 0 auto; }
  header { margin-bottom: 48px; }
  .label { font-size: 12px; font-weight: 400; letter-spacing: 0.08em; color: var(--grey-muted); text-transform: uppercase; margin-bottom: 12px; }
  h1 { font-size: 30px; font-weight: 700; line-height: 1.13; letter-spacing: -0.02em; color: var(--black); margin-bottom: 10px; }
  .subtitle { font-size: 15px; font-weight: 400; color: var(--grey-muted); line-height: 1.5; }
  .status-bar { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 400; color: var(--grey-muted); margin-bottom: 32px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--grey-outline); transition: background 0.3s; flex-shrink: 0; }
  .status-dot.connected { background: var(--black); }
  .status-dot.error { background: var(--red); }
  .name-box { display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--black); padding-bottom: 12px; margin-bottom: 32px; }
  .name-label { font-size: 13px; font-weight: 700; color: var(--black); white-space: nowrap; }
  input.name-input { flex: 1; background: transparent; border: none; outline: none; font-family: inherit; font-size: 15px; font-weight: 400; color: var(--black); padding: 0; }
  input.name-input::placeholder { color: var(--grey-muted); }
  .tabs { display: flex; border-bottom: 1px solid var(--grey-outline); margin-bottom: 32px; }
  .tab { flex: 1; padding: 14px 0; border: none; background: transparent; font-family: inherit; font-size: 13px; font-weight: 700; color: var(--grey-muted); cursor: pointer; letter-spacing: 0.02em; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 150ms, border-color 150ms; }
  .tab.active { color: var(--black); border-bottom-color: var(--black); }
  .input-box { margin-bottom: 32px; }
  .input-label { font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--grey-muted); margin-bottom: 12px; }
  .input-row { display: flex; gap: 12px; align-items: flex-end; }
  textarea#ideaInput { flex: 1; background: transparent; border: 1px solid var(--grey-outline); padding: 14px 16px; color: var(--black); font-family: inherit; font-size: 15px; font-weight: 400; outline: none; resize: none; min-height: 96px; line-height: 1.5; transition: border-color 150ms cubic-bezier(0.2,0,0,1); }
  textarea#ideaInput:focus { border-color: var(--black); }
  textarea#ideaInput::placeholder { color: var(--grey-muted); }
  .btn-add { background: var(--black); border: none; padding: 14px 20px; color: var(--white); font-family: inherit; font-size: 20px; font-weight: 400; cursor: pointer; border-radius: 2px; transition: opacity 150ms; line-height: 1; flex-shrink: 0; }
  .btn-add:hover { opacity: 0.75; }
  .section-meta { font-size: 12px; font-weight: 400; color: var(--grey-muted); margin-bottom: 16px; }
  .idea-card { display: flex; align-items: flex-start; gap: 16px; padding: 18px 0; border-bottom: 1px solid var(--grey-outline); animation: fadeUp 0.25s cubic-bezier(0.2,0,0,1); }
  .idea-card:first-child { border-top: 1px solid var(--grey-outline); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .idea-num { font-size: 12px; font-weight: 400; color: var(--grey-muted); min-width: 20px; padding-top: 2px; flex-shrink: 0; }
  .idea-body { flex: 1; min-width: 0; }
  .idea-text { font-size: 15px; font-weight: 700; line-height: 1.36; white-space: pre-wrap; word-break: break-word; }
  .idea-by { font-size: 12px; font-weight: 400; color: var(--grey-muted); margin-top: 4px; }
  .del-btn { background: transparent; border: none; color: var(--grey-outline); font-size: 14px; cursor: pointer; padding: 2px 4px; flex-shrink: 0; transition: color 150ms; line-height: 1; }
  .del-btn:hover { color: var(--red); }
  .vote-card { padding: 18px 0; border-bottom: 1px solid var(--grey-outline); animation: fadeUp 0.25s cubic-bezier(0.2,0,0,1); }
  .vote-card:first-child { border-top: 1px solid var(--grey-outline); }
  .vote-row { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 12px; }
  .vote-rank { font-size: 12px; font-weight: 400; color: var(--grey-muted); min-width: 20px; padding-top: 2px; flex-shrink: 0; }
  .vote-rank.gold { font-weight: 700; color: var(--black); }
  .vote-body { flex: 1; min-width: 0; }
  .vote-text { font-size: 15px; font-weight: 700; line-height: 1.36; white-space: pre-wrap; word-break: break-word; margin-bottom: 4px; }
  .voters-list { font-size: 12px; font-weight: 400; color: var(--grey-muted); line-height: 1.36; }
  .vote-btn { display: flex; flex-direction: column; align-items: center; gap: 2px; background: var(--white); border: 1px solid var(--grey-outline); border-radius: 2px; padding: 8px 14px; cursor: pointer; transition: border-color 150ms cubic-bezier(0.2,0,0,1); color: var(--black); min-width: 52px; flex-shrink: 0; font-family: inherit; }
  .vote-btn:hover { border-color: var(--black); }
  .vote-btn.voted { background: var(--black); border-color: var(--black); color: var(--white); }
  .vote-emoji { font-size: 16px; line-height: 1; }
  .vote-count { font-size: 12px; font-weight: 700; }
  .bar-bg { height: 2px; background: #f0f0f0; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--black); transition: width 0.4s cubic-bezier(0.2,0,0,1); }
  .empty { padding: 40px 0; font-size: 15px; font-weight: 400; color: var(--grey-muted); line-height: 1.5; }
  .btn-ghost { display: block; width: 100%; padding: 11px 24px; background: var(--white); border: 1px solid var(--grey-outline); border-radius: 4px; color: var(--black); font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; transition: border-color 150ms; margin-top: 24px; letter-spacing: 0.02em; }
  .btn-ghost:hover { border-color: var(--black); }
  .vote-note-wrap { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .vote-note { font-size: 12px; font-weight: 400; color: var(--grey-muted); }
  .loading { padding: 32px 0; font-size: 13px; color: var(--grey-muted); }
</style>
</head>
<body>
<div class="container">
  <header>
    <p class="label">Team Rapo · 2026</p>
    <h1>의사랑기획품질팀<br>라포 활동 투표</h1>
    <p class="subtitle">하고 싶은 활동을 자유롭게 제안하고<br>마음에 드는 것에 투표해주세요.</p>
  </header>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">연결 중...</span>
  </div>

  <div class="name-box">
    <span class="name-label">이름</span>
    <input class="name-input" id="nameInput" type="text" placeholder="투표 전 이름을 입력해주세요" maxlength="12" />
  </div>

  <div class="tabs">
    <button class="tab active" id="tabIdea" onclick="switchTab('idea')">아이디어 제안</button>
    <button class="tab"        id="tabVote" onclick="switchTab('vote')">투표하기</button>
  </div>

  <div id="ideaPhase">
    <div class="input-box">
      <div class="input-label">Activity Idea <span style="font-weight:400;font-size:11px;letter-spacing:0">— Ctrl+Enter로 추가</span></div>
      <div class="input-row">
        <textarea id="ideaInput" placeholder="예) 방탈출, 볼링, 보드게임카페&#10;자유롭게 설명도 적어주세요." maxlength="200"></textarea>
        <button class="btn-add" onclick="addIdea()">+</button>
      </div>
    </div>
    <div class="section-meta" id="ideaCount"></div>
    <div id="ideasList"><div class="loading">불러오는 중...</div></div>
  </div>

  <div id="votePhase" style="display:none;">
    <div class="vote-note-wrap">
      <span class="vote-note">마음에 드는 활동에 투표하세요 — 중복 가능</span>
    </div>
    <div id="voteList"><div class="loading">불러오는 중...</div></div>
    <button class="btn-ghost" onclick="resetVotes()">투표 초기화</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, push, remove, update, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0lB-_Qov1kaTbvR4s__mFeJ0xjbjBi9A",
  authDomain: "rapo-vote.firebaseapp.com",
  databaseURL: "https://rapo-vote-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "rapo-vote",
  storageBucket: "rapo-vote.firebasestorage.app",
  messagingSenderId: "37250174974",
  appId: "1:37250174974:web:ed6ed1f07c6d0f75813aaf"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const ideasRef = ref(db, 'ideas');

let ideasCache = {};
let currentTab = 'idea';

function setStatus(ok, msg) {
  document.getElementById('statusDot').className = 'status-dot ' + (ok ? 'connected' : 'error');
  document.getElementById('statusText').textContent = msg;
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function getName(){ return document.getElementById('nameInput').value.trim(); }
function safeName(n){ return n.replace(/[.#[\]/]/g,'_'); }

onValue(ideasRef, (snapshot) => {
  ideasCache = snapshot.val() || {};
  setStatus(true, '실시간 연결됨');
  currentTab === 'idea' ? renderIdeas() : renderVotes();
}, () => setStatus(false, '연결 오류'));

window.switchTab = function(t) {
  currentTab = t;
  document.getElementById('ideaPhase').style.display = t==='idea' ? '' : 'none';
  document.getElementById('votePhase').style.display  = t==='vote' ? '' : 'none';
  document.getElementById('tabIdea').className = 'tab'+(t==='idea'?' active':'');
  document.getElementById('tabVote').className = 'tab'+(t==='vote'?' active':'');
  t==='idea' ? renderIdeas() : renderVotes();
};

window.addIdea = function() {
  const inp = document.getElementById('ideaInput');
  const txt = inp.value.trim();
  if(!txt){ inp.focus(); return; }
  const name = getName();
  if(!name){ alert('이름을 먼저 입력해주세요.'); document.getElementById('nameInput').focus(); return; }
  push(ideasRef, { text: txt, by: name, votes: 0, voters: {} });
  inp.value = '';
  inp.focus();
};

document.getElementById('ideaInput').addEventListener('keydown', e=>{
  if(e.key==='Enter' && (e.ctrlKey||e.metaKey)) window.addIdea();
});

window.deleteIdea = function(key) {
  if(!confirm('삭제할까요?')) return;
  remove(ref(db, 'ideas/'+key));
};

window.voteIdea = function(key) {
  const me = getName();
  if(!me){ alert('이름을 먼저 입력해주세요.'); document.getElementById('nameInput').focus(); return; }
  const idea = ideasCache[key];
  if(!idea) return;
  const sm = safeName(me);
  const voted = !!(idea.voters||{})[sm];
  const updates = {};
  updates[`ideas/${key}/voters/${sm}`] = voted ? null : true;
  updates[`ideas/${key}/votes`] = (idea.votes||0) + (voted ? -1 : 1);
  update(ref(db), updates);
};

window.resetVotes = function() {
  if(!confirm('모든 투표를 초기화할까요?')) return;
  const updates = {};
  Object.keys(ideasCache).forEach(k => {
    updates[`ideas/${k}/votes`] = 0;
    updates[`ideas/${k}/voters`] = {};
  });
  update(ref(db), updates);
};

function renderIdeas() {
  const el = document.getElementById('ideasList');
  const countEl = document.getElementById('ideaCount');
  const keys = Object.keys(ideasCache);
  countEl.textContent = keys.length ? `${keys.length}개의 아이디어` : '';
  if(!keys.length){
    el.innerHTML = '<div class="empty">아직 아이디어가 없어요.<br>첫 번째로 제안해보세요.</div>';
    return;
  }
  el.innerHTML = keys.map((key, idx) => {
    const i = ideasCache[key];
    return `<div class="idea-card">
      <div class="idea-num">${String(idx+1).padStart(2,'0')}</div>
      <div class="idea-body">
        <div class="idea-text">${esc(i.text)}</div>
        <div class="idea-by">${esc(i.by)}</div>
      </div>
      <button class="del-btn" onclick="deleteIdea('${key}')">✕</button>
    </div>`;
  }).join('');
}

function renderVotes() {
  const me = getName();
  const sm = safeName(me);
  const el = document.getElementById('voteList');
  const entries = Object.entries(ideasCache);
  if(!entries.length){
    el.innerHTML = '<div class="empty">아이디어 탭에서 먼저 제안해주세요.</div>';
    return;
  }
  const sorted = entries.sort((a,b)=>(b[1].votes||0)-(a[1].votes||0));
  const max = Math.max(1, sorted[0]?.[1]?.votes || 0);
  el.innerHTML = sorted.map(([key, idea], idx) => {
    const votes = idea.votes || 0;
    const voters = idea.voters || {};
    const voted = sm && !!voters[sm];
    const isTop = idx===0 && votes>0;
    const pct = Math.round((votes/max)*100);
    const voterNames = Object.keys(voters).map(v=>v.replace(/_/g,' ')).join(', ');
    return `<div class="vote-card">
      <div class="vote-row">
        <div class="vote-rank ${isTop?'gold':''}">${String(idx+1).padStart(2,'0')}</div>
        <div class="vote-body">
          <div class="vote-text">${esc(idea.text)}</div>
          ${voterNames ? `<div class="voters-list">${esc(voterNames)}</div>` : ''}
        </div>
        <button class="vote-btn ${voted?'voted':''}" onclick="voteIdea('${key}')">
          <span class="vote-emoji">👍</span>
          <span class="vote-count">${votes}</span>
        </button>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
